name: Generate Car Animation

on:
  schedule:
    # Run daily at 12:00 PM UTC
    - cron: '0 12 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow
      
      - name: Generate car animations
        run: python scripts/generate_car_apng.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add images/car-*.png
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update car animations - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)
